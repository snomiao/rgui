<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rgui · lane — 1-D semantic zoom</title>
    <link rel="icon" type="image/gif" href="/assets/rgui-icon-32.gif" />
    <link rel="alternate icon" type="image/png" href="/assets/rgui-icon-32.png" />
    <meta
      name="description"
      content="rgui lane — limited-visual-width mode. Zoom is a renormalization-group flow along ONE axis: content grows taller and reveals more detail, but its width never changes. For folder trees and time series (1-D data)."
    />
    <script>
      // set the theme BEFORE first paint (no flash): saved choice, else OS
      document.documentElement.dataset.theme =
        localStorage.getItem("rgui-theme") ??
        (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    </script>
    <style>
      :root {
        --bg: #101a2d;
        --text: #e7eef7;
        --text-dim: #bfd0e4;
        --text-muted: #91a9c7;
        --text-faint: #5e7698;
        --border: #345275;
        --panel: rgba(12, 25, 44, 0.88);
        --panel-strong: rgba(14, 29, 50, 0.94);
        --accent: #ffd447;
      }
      :root[data-theme="light"] {
        --bg: #f4ca79;
        --text: #342715;
        --text-dim: #5b4325;
        --text-muted: #7f6034;
        --text-faint: #a9844c;
        --border: #c99b4b;
        --panel: rgba(255, 239, 190, 0.9);
        --panel-strong: rgba(255, 245, 211, 0.96);
        --accent: #8b2fc9;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
      }
      #viewer {
        position: relative;
        z-index: 1;
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: ns-resize;
      }
      /* top toolbar: dataset switch · title · home + theme */
      #bar {
        position: fixed;
        top: 10px;
        left: 12px;
        right: 12px;
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
      }
      #bar > * {
        pointer-events: auto;
      }
      .seg {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 7px;
        overflow: hidden;
        background: var(--panel);
      }
      .demo-nav {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--panel);
      }
      .demo-nav select {
        min-height: 32px;
        padding: 0 34px 0 12px;
        border: 0;
        border-radius: 7px;
        appearance: none;
        background:
          linear-gradient(45deg, transparent 50%, var(--text-dim) 50%) right 16px center / 5px 5px no-repeat,
          linear-gradient(135deg, var(--text-dim) 50%, transparent 50%) right 11px center / 5px 5px no-repeat,
          transparent;
        color: var(--text);
        font: 700 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        cursor: pointer;
        outline: none;
      }
      .demo-nav:focus-within,
      .demo-nav:hover {
        border-color: var(--accent);
      }
      .seg button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text-dim);
        font: 600 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 8px 13px;
        cursor: pointer;
        transition: color 120ms, background 120ms;
      }
      .seg button + button {
        border-left: 1px solid var(--border);
      }
      .seg a {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 13px;
        color: var(--text-dim);
        text-decoration: none;
        font: 600 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        transition: color 120ms, background 120ms;
      }
      .seg a + a {
        border-left: 1px solid var(--border);
      }
      .seg a:hover {
        color: var(--accent);
      }
      .seg a[aria-current="page"] {
        color: var(--bg);
        background: var(--accent);
      }
      .seg button[aria-pressed="true"] {
        color: var(--bg);
        background: var(--accent);
      }
      .seg button:not([aria-pressed="true"]):hover {
        color: var(--accent);
      }
      .grow {
        flex: 1;
      }
      #wordmark {
        font-weight: 700;
        font-size: 13px;
        letter-spacing: -0.02em;
        color: var(--text);
        text-decoration: none;
      }
      #wordmark span {
        color: var(--text-muted);
        font-weight: 500;
      }
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: var(--panel);
        color: var(--text-dim);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        text-decoration: none;
        transition: border-color 120ms, color 120ms, transform 120ms;
      }
      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      #theme-toggle:hover {
        transform: rotate(-15deg);
      }
      #logscale[aria-pressed="true"],
      #axis[aria-pressed="true"],
      #fold[aria-pressed="true"] {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }
      /* repo input (folder-tree view) */
      #repo {
        width: 200px;
        padding: 7px 11px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        font: 500 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        outline: none;
      }
      #repo:focus {
        border-color: var(--accent);
      }
      #repo::placeholder {
        color: var(--text-faint);
      }
      #repostat {
        font: 500 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--text-muted);
        pointer-events: none;
      }
      /* search-to-focus */
      #search {
        width: 180px;
        padding: 7px 11px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        font: 500 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        outline: none;
      }
      #search:focus {
        border-color: var(--accent);
        width: 240px;
      }
      #search::placeholder {
        color: var(--text-faint);
      }
      #suggest {
        position: absolute;
        top: 36px;
        left: 0;
        right: 0;
        display: none;
        flex-direction: column;
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 7px;
        overflow: hidden;
        max-height: 260px;
        overflow-y: auto;
      }
      #suggest:not(:empty) {
        display: flex;
      }
      #suggest .hit {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        font: 500 12px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--text);
      }
      #suggest .hit:last-child {
        border-bottom: 0;
      }
      #suggest .hit:hover,
      #suggest .hit.active {
        background: color-mix(in srgb, var(--accent) 18%, transparent);
      }
      #suggest .hit .swatch {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      #suggest .hit .det {
        color: var(--text-muted);
        font-size: 10px;
      }
      /* event-type filter chips (deep-time view only) */
      #filters {
        position: fixed;
        top: 54px;
        left: 12px;
        z-index: 30;
        display: none;
        flex-wrap: wrap;
        gap: 6px;
        max-width: 40vw;
      }
      #filters .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 9px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        color: var(--text-muted);
        font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        cursor: pointer;
        user-select: none;
        transition: color 120ms, border-color 120ms, opacity 120ms;
      }
      #filters .chip .swatch {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      #filters .chip[aria-pressed="false"] {
        opacity: 0.42;
      }
      #filters .chip[aria-pressed="true"] {
        color: var(--text);
        border-color: var(--text-faint);
      }
      #hudcol {
        position: fixed;
        bottom: 10px;
        left: 12px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-start;
        pointer-events: none;
        user-select: none;
      }
      #debug,
      #net {
        padding: 6px 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre;
      }
      #net:empty {
        display: none;
      }
      #debug .dim,
      #net .dim {
        color: var(--text-muted);
      }
      #debug .hi,
      #net .hi {
        color: var(--accent);
      }
      /* Wikipedia hover card */
      #card {
        position: fixed;
        z-index: 45;
        display: none;
        width: 290px;
        max-height: 340px;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--panel-strong);
        color: var(--text);
        text-decoration: none;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #card.show {
        display: block;
      }
      #card img {
        display: block;
        width: 100%;
        height: 130px;
        object-fit: cover;
        background: var(--panel);
      }
      #card .body {
        padding: 10px 12px 12px;
      }
      #card .t {
        font-weight: 700;
        font-size: 14px;
        margin: 0 0 4px;
        color: var(--text);
      }
      #card .x {
        font-size: 12px;
        line-height: 1.5;
        color: var(--text-dim);
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      #card .src {
        margin-top: 7px;
        font: 600 10px/1 ui-monospace, Menlo, monospace;
        color: var(--accent);
        letter-spacing: 0.03em;
      }
      #hint {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 30;
        max-width: 46ch;
        text-align: right;
        color: var(--text-faint);
        font: 11px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
        user-select: none;
      }
      #hint b {
        color: var(--text-muted);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <canvas id="viewer"></canvas>

    <div id="bar">
      <div class="demo-nav">
        <select id="demo-nav" aria-label="rgui demo switch">
          <option value="/">2D Graph</option>
          <option value="/lane/" selected>1D Lane</option>
          <option value="/cube/">3D Cube</option>
          <option value="/world/">3D World</option>
          <option value="https://agent-yes.com/r/">agent-yes RGUI</option>
          <option value="https://otoji.org/">otoji</option>
        </select>
      </div>
      <div class="seg" id="dataset" role="group" aria-label="dataset">
        <button data-src="tree" aria-pressed="true">📁 Folder tree</button>
        <button data-src="time" aria-pressed="false">🌌 Deep time</button>
        <button data-src="series" aria-pressed="false">📈 Signal</button>
      </div>
      <div id="searchwrap" style="display: none; position: relative;">
        <input id="search" type="search" placeholder="Search events…" autocomplete="off" spellcheck="false" />
        <div id="suggest"></div>
      </div>
      <input id="repo" type="text" placeholder="owner/repo or GitHub URL" autocomplete="off" spellcheck="false" value="torvalds/linux" style="display: none;" />
      <span id="repostat"></span>
      <button class="icon-btn" id="axis" title="Toggle log / linear time axis" style="display: none; width: auto; border-radius: 7px; padding: 0 12px; font: 600 12px/1 ui-monospace, Menlo, monospace;">log axis</button>
      <button class="icon-btn" id="fold" title="Fold time into calendar-year rows (Jan–Dec across, one row per year)" style="display: none; width: auto; border-radius: 7px; padding: 0 12px; font: 600 12px/1 ui-monospace, Menlo, monospace;">fold: off</button>
      <button class="icon-btn" id="prefs" title="Preferences" style="width: auto; border-radius: 7px; padding: 0 10px; font: 600 12px/1 ui-monospace, Menlo, monospace;">⚙</button>
      <div id="prefsPanel" style="display: none; position: absolute; top: 44px; right: 12px; z-index: 40; background: rgba(24,24,28,0.96); border: 1px solid rgba(148,163,184,0.35); border-radius: 9px; padding: 10px 14px; font: 12px/1.9 ui-monospace, Menlo, monospace; color: #cbd5e0; min-width: 240px;">
        <div style="font-weight: 700; margin-bottom: 4px;">Preferences</div>
        <label style="display: block; cursor: pointer;"><input type="checkbox" id="prefAutoZoomOut" /> auto zoom-out on empty scroll</label>
        <label style="display: block; cursor: pointer;"><input type="checkbox" id="prefGlide" checked /> fold transition animation</label>
        <label style="display: block; cursor: pointer;"><input type="checkbox" id="prefHeat" checked /> density heat cells</label>
        <label style="display: block; cursor: pointer;"><input type="checkbox" id="prefTreeLive" /> tree demo: live mutations</label>
      </div>
      <button class="icon-btn" id="logscale" title="Toggle symlog value axis" style="display: none; width: auto; border-radius: 7px; padding: 0 12px; font: 600 12px/1 ui-monospace, Menlo, monospace;">log</button>
      <div class="grow"></div>
      <a id="wordmark" href="/">RGUI<span> · lane</span></a>
      <a class="icon-btn" id="home" href="/" title="2D graph mode">⊞</a>
      <select id="lang" title="Label language" style="height: 30px; border-radius: 7px; border: 1px solid rgba(148,163,184,0.35); background: transparent; color: inherit; font: 600 12px/1 ui-monospace, Menlo, monospace; padding: 0 6px; cursor: pointer;">
        <option value="auto">🌐 auto</option>
        <option value="en">EN</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
        <option value="es">ES</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
      </select>
      <button class="icon-btn" id="theme-toggle" title="Toggle light / dark">◐</button>
    </div>

    <div id="filters" role="group" aria-label="event types"></div>

    <div id="hudcol">
      <div id="net"></div>
      <div id="debug"></div>
    </div>
    <a id="card" target="_blank" rel="noopener"></a>

    <div id="hint">
      <b>scroll</b> = move · <b>⌘/ctrl-scroll</b> or <b>pinch</b> = zoom (faster the harder you flick) · <b>R/F</b> or <b>D/A</b> = zoom · <b>W/S</b> = scroll · <b>dbl-click</b> = focus<br />
      zoom grows height &amp; detail — width never changes
    </div>

    <script type="module" src="/src/lane-main.ts"></script>
    <script>
      document.querySelector("#demo-nav")?.addEventListener("change", (e) => {
        location.href = e.target.value;
      });
    </script>
  </body>
</html>
