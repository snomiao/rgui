<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rgui — readable grid UI</title>
    <link rel="icon" type="image/gif" href="./assets/rgui-icon-32.gif" />
    <link rel="alternate icon" type="image/png" href="./assets/rgui-icon-32.png" />
    <meta
      name="description"
      content="rgui — a framework-agnostic readable-grid UI library. Zoom is a renormalization-group flow: at every scale, only the relevant couplings survive."
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1c2126;
      }
      #viewer {
        position: relative;
        z-index: 1; /* nodes render above the behind-layer title */
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: grab;
      }
      #debug {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 8px;
        background: rgba(20, 22, 26, 0.85);
        border: 1px solid #3a4048;
        border-radius: 4px;
        color: #e6e9ec;
        font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      #debug .dim { color: #8b949e; }
      #debug .hi { color: #ffd60a; }

      /* ── Hero overlay ─────────────────────────────────────────────
         Sits on top of the live rgui canvas without stealing pointer
         events, so the graph underneath stays pannable/zoomable.
         Only interactive children (links) re-enable pointer events. */
      #hero {
        position: fixed;
        inset: 0;
        z-index: 2; /* interactive hero chrome stays on top */
        z-index: 10; /* above the demo's DOM node overlays */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        padding: 24px;
        box-sizing: border-box;
        pointer-events: none;
        user-select: none;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #e6e9ec;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
      }
      #hero .title {
        margin: 0;
        font-size: clamp(72px, 22vw, 260px);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.9;
        /* the mascot crossover: purple head (TL) flowing to gold tail (BR) */
        background: linear-gradient(
          135deg,
          #9b34bf 0%,
          #c74be0 32%,
          #f3820d 68%,
          #ffd21c 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        /* no CSS filter here: a filtered layer over the live canvas re-rasters
           every frame (measured 4x page slowdown) — the shadow is painted
           inside the title canvas instead */
      }
      #hero .title::after {
        content: "·rg";
        font-size: 0.28em;
        color: #8b949e;
        vertical-align: super;
        letter-spacing: 0;
      }
      /* Cycling subtitle — CRT-flash glitch between expansions */
      #hero .subtitle {
        position: relative;
        height: 1.4em;
        min-height: 1.4em;
        font-size: clamp(15px, 3.6vw, 30px);
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #e6e9ec;
      }
      #hero .subtitle .word {
        display: inline-block;
        will-change: opacity, transform, filter;
      }
      #hero .subtitle .word.flash {
        animation: crt-flash 2500ms ease-in-out;
      }
      @keyframes crt-flash {
        0% { opacity: 0; transform: translateY(2px) skewX(4deg); }
        8% { opacity: 1; transform: translateX(-2px) skewX(-3deg); }
        14% { transform: translateX(0) skewX(0); }
        88% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-2px); }
      }
      #hero .tagline {
        max-width: 720px;
        margin: 4px 0 0;
        font-size: clamp(12px, 2vw, 16px);
        line-height: 1.6;
        color: #aeb6bf;
        font-weight: 400;
      }
      #hero .tagline b { color: #ffd60a; font-weight: 600; }
      #hero .links {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 6px;
        pointer-events: auto;
      }
      #hero .links a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border: 1px solid #3a4048;
        border-radius: 6px;
        background: rgba(20, 22, 26, 0.7);
        /* backdrop-filter removed: re-blurs every frame over a live canvas */
        color: #e6e9ec;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: border-color 120ms, color 120ms, background 120ms;
      }
      #hero .links a:hover {
        border-color: #ffd60a;
        color: #ffd60a;
        background: rgba(20, 22, 26, 0.9);
      }
      #hero .hint {
        margin-top: 2px;
        font-size: 11px;
        color: #5c6570;
        letter-spacing: 0.04em;
      }
      @media (prefers-reduced-motion: reduce) {
        #hero .subtitle .word.flash { animation: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="viewer"></canvas>
    <div id="debug"></div>

    <div id="hero">
      <h1 class="title">RGUI</h1>
      <div class="subtitle" aria-live="polite"><span class="word" id="hero-word"></span></div>
      <p class="tagline">
        Zoom is a <b>renormalization-group flow</b>: at every scale, only the
        relevant couplings survive — and the canvas stays readable.
      </p>
      <nav class="links">
        <a href="https://github.com/snomiao/rgui" target="_blank" rel="noopener">GitHub ↗</a>
        <a href="https://www.npmjs.com/package/@snomiao/rgui" target="_blank" rel="noopener">
          npm · @snomiao/rgui ↗
        </a>
      </nav>
      <div class="hint">drag · scroll to zoom · the graph is live behind this</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/hero.ts"></script>
    <script type="module" src="/src/title.ts"></script>
    <script type="module" src="/src/cube.ts"></script>
    <!-- entry script (not an import): package sideEffects:false would let
         the bundler drop a side-effect-only import of this module -->
    <script type="module" src="/src/gizmo.ts"></script>
  </body>
</html>
